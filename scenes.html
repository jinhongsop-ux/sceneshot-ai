<script>
renderNavbar('scenes');
renderFooter();
renderBottomBar();

// Load scenes from API
async function loadScenesGrid() {
    try {
        const resp = await apiCall('GET', '/api/scenes');
        const scenes = resp.scenes || [];
        if (!scenes.length) return;

        const gradients = {
            'korean-baseball-broadcast': 'from-blue-400 to-blue-600',
            'executive-office': 'from-amber-600 to-amber-800',
            'cyberpunk-city': 'from-purple-500 to-indigo-700',
            'mountain-summit': 'from-orange-400 to-rose-500',
            'morning-coffee': 'from-amber-500 to-amber-700',
            'power-lift': 'from-red-500 to-red-700',
        };

        const grid = document.querySelector('.grid');
        grid.innerHTML = scenes.map(s => `
            <a href="scene-detail.html?slug=${s.slug}" class="group block">
                <div class="relative rounded-2xl overflow-hidden shadow-[0_16px_40px_rgba(35,31,27,0.06)] border border-outline-variant/10 hover:-translate-y-2 transition-all duration-300">
                    <div class="w-full h-48 md:h-64 bg-gradient-to-br ${gradients[s.slug] || 'from-gray-400 to-gray-600'} flex items-center justify-center group-hover:scale-105 transition-transform duration-500">
                        <span class="text-white/60 font-display-xl">${s.name_zh || s.name}</span>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent flex flex-col justify-end p-4">
                        <span class="text-white font-headline-md text-[18px]">${s.name_zh || s.name}</span>
                        <span class="text-white/80 font-caption text-caption flex items-center gap-1">
                            <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">toll</span>
                            1 次解锁
                        </span>
                    </div>
                    ${s.is_featured ? '<div class="absolute top-3 left-3 bg-primary text-on-primary px-2.5 py-1 rounded-full font-caption text-caption font-semibold">热门</div>' : ''}
                </div>
            </a>
        `).join('');
    } catch (e) {
        console.error('Failed to load scenes:', e);
    }
}
loadScenesGrid();
</script>
