<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SceneShot AI - 仪表盘</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/shared.css"/>
<script src="js/shared.js"></script>
<script>tailwind.config = TAILWIND_CONFIG;</script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen">
<main class="lg:ml-64 pt-[80px] pb-32 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
<!-- Mobile Dashboard Tabs -->
<div class="lg:hidden flex gap-2 overflow-x-auto pb-4 border-b border-outline-variant/20 mb-8">
    <a class="whitespace-nowrap px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-bold text-label-bold" href="#" data-i18n="sidebar.creations">我的作品</a>
    <a href="credits.html" class="whitespace-nowrap px-4 py-2 text-on-surface-variant hover:bg-surface-variant/50 rounded-full font-label-bold text-label-bold transition-colors" data-i18n="sidebar.credits">积分</a>
    <a href="pricing.html" class="whitespace-nowrap px-4 py-2 text-on-surface-variant hover:bg-surface-variant/50 rounded-full font-label-bold text-label-bold transition-colors">定价</a>
</div>

<!-- User Info Card -->
<section id="user-card" class="glass-panel rounded-2xl p-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 shadow-[0_20px_50px_rgba(35,31,27,0.04)] mb-8 reveal">
    <div class="flex items-center gap-6">
        <div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-primary">
            <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">person</span>
        </div>
        <div>
            <p class="font-caption text-caption text-on-surface-variant uppercase tracking-wider mb-1">用户名</p>
            <h3 id="dash-username" class="font-display-xl text-headline-lg-mobile md:text-headline-lg text-on-surface">-</h3>
            <p id="dash-email" class="text-sm text-on-surface-variant mt-1">-</p>
        </div>
    </div>
</section>

<!-- Entitlements Cards -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="premium-card p-6">
        <p class="font-caption text-caption text-on-surface-variant uppercase tracking-wider">免费试用剩余</p>
        <div class="mt-3 flex items-end gap-2">
            <span id="dash-trials" class="font-display-xl text-headline-lg text-on-surface">0</span>
            <span class="text-on-surface-variant text-sm mb-1">次</span>
        </div>
    </div>
    <div class="premium-card p-6">
        <p class="font-caption text-caption text-on-surface-variant uppercase tracking-wider">付费解锁额度</p>
        <div class="mt-3 flex items-end gap-2">
            <span id="dash-unlocks" class="font-display-xl text-headline-lg text-primary">0</span>
            <span class="text-on-surface-variant text-sm mb-1">次</span>
        </div>
    </div>
    <div class="premium-card p-6">
        <p class="font-caption text-caption text-on-surface-variant uppercase tracking-wider">积分余额</p>
        <div class="mt-3 flex items-end gap-2">
            <span id="dash-credits" class="font-display-xl text-headline-lg text-on-surface">0</span>
            <span class="text-on-surface-variant text-sm mb-1">积分</span>
        </div>
        <a href="pricing.html" class="mt-3 inline-block text-primary font-label-bold text-label-bold hover:underline">购买更多</a>
    </div>
</section>

<!-- Recent Generations -->
<section class="mb-8">
    <div class="flex justify-between items-end mb-6">
        <h2 class="font-headline-lg text-headline-md text-on-surface">最近生成</h2>
        <a href="create.html" class="cta-btn text-sm px-4 py-2">
            <span class="material-symbols-outlined text-[18px]">add</span>
            <span>新建</span>
        </a>
    </div>
    <div id="dash-generations" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="text-on-surface-variant py-8 text-center col-span-full">加载中...</div>
    </div>
</section>

<!-- Recent Orders -->
<section class="mb-8">
    <h2 class="font-headline-lg text-headline-md text-on-surface mb-6">订单记录</h2>
    <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/20 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-surface-container-low text-on-surface-variant font-label-bold text-label-bold uppercase tracking-wider text-[11px]">
                        <th class="p-4 pl-6">时间</th>
                        <th class="p-4">套餐</th>
                        <th class="p-4 text-right">金额</th>
                        <th class="p-4 pr-6 text-right">状态</th>
                    </tr>
                </thead>
                <tbody id="dash-orders" class="font-body-md text-body-md divide-y divide-outline-variant/20">
                    <tr><td colspan="4" class="p-4 text-center text-on-surface-variant">暂无订单</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- Recent Transactions -->
<section>
    <h2 class="font-headline-lg text-headline-md text-on-surface mb-6">交易流水</h2>
    <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/20 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-surface-container-low text-on-surface-variant font-label-bold text-label-bold uppercase tracking-wider text-[11px]">
                        <th class="p-4 pl-6">时间</th>
                        <th class="p-4">描述</th>
                        <th class="p-4 text-right">数量</th>
                        <th class="p-4 pr-6 text-right">类型</th>
                    </tr>
                </thead>
                <tbody id="dash-transactions" class="font-body-md text-body-md divide-y divide-outline-variant/20">
                    <tr><td colspan="4" class="p-4 text-center text-on-surface-variant">暂无记录</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</main>
<script>
renderNavbar('dashboard');
renderSidebar('creations', [
    {id:'creations', key:'sidebar.creations', icon:'image', href:'dashboard.html'},
    {id:'credits', key:'sidebar.credits', icon:'payments', href:'credits.html'},
    {id:'pricing', key:'nav.pricing', icon:'shopping_bag', href:'pricing.html'},
    {id:'settings', key:'sidebar.settings', icon:'settings', href:'#'}
]);
renderFooter();
renderBottomBar();

async function loadDashboard() {
    if (!AuthState.isLoggedIn) {
        await initAuth();
    }
    if (!AuthState.isLoggedIn) {
        window.location.href = 'create.html';
        return;
    }

    try {
        const data = await apiCall('GET', '/api/dashboard');

        // User info
        document.getElementById('dash-username').textContent = data.user.username;
        document.getElementById('dash-email').textContent = data.user.email || '未绑定邮箱';

        // Entitlements
        if (data.entitlements) {
            document.getElementById('dash-trials').textContent = data.entitlements.free_trials_remaining || 0;
            document.getElementById('dash-unlocks').textContent = data.entitlements.paid_unlocks_remaining || 0;
            document.getElementById('dash-credits').textContent = data.entitlements.credits_balance || 0;
        }

        // Generations
        const gens = data.recentGenerations || [];
        const gensContainer = document.getElementById('dash-generations');
        if (gens.length === 0) {
            gensContainer.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <span class="material-symbols-outlined text-4xl text-on-surface-variant/40 mb-4 block">auto_awesome</span>
                    <p class="text-on-surface-variant mb-4">还没有生成过作品</p>
                    <a href="create.html" class="cta-btn inline-flex px-6 py-3">开始创作</a>
                </div>
            `;
        } else {
            gensContainer.innerHTML = gens.map(g => {
                const sceneName = g.scene_id || '场景';
                const status = g.is_unlocked ? '已解锁' : '带水印';
                const statusColor = g.is_unlocked ? 'text-green-600' : 'text-on-surface-variant';
                const img = g.is_unlocked ? g.hd_url : g.watermarked_url;
                return `
                    <div class="group relative rounded-2xl overflow-hidden bg-surface shadow-[0_16px_40px_rgba(35,31,27,0.06)] hover:-translate-y-1 hover:shadow-[0_24px_60px_rgba(35,31,27,0.08)] transition-all duration-300 border border-outline-variant/10">
                        <div class="aspect-[4/3] bg-surface-variant relative overflow-hidden">
                            ${img ? `<img alt="生成结果" class="w-full h-full object-cover" src="${img}"/>` : '<div class="w-full h-full bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center"><span class="text-on-surface-variant/40">处理中</span></div>'}
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full flex items-center gap-1 shadow-sm border border-outline-variant/10">
                                <span class="font-caption text-caption ${statusColor}">${status}</span>
                            </div>
                        </div>
                        <div class="p-4 flex justify-between items-center bg-surface-container-lowest">
                            <div>
                                <p class="font-label-bold text-label-bold text-on-surface">${g.status === 'succeeded' ? '生成成功' : g.status}</p>
                                <p class="font-caption text-caption text-on-surface-variant">${new Date(g.created_at).toLocaleDateString('zh-CN')}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Orders
        const orders = data.recentOrders || [];
        const ordersBody = document.getElementById('dash-orders');
        if (orders.length === 0) {
            ordersBody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-on-surface-variant">暂无订单</td></tr>';
        } else {
            ordersBody.innerHTML = orders.map(o => `
                <tr class="hover:bg-surface-container-lowest/50 transition-colors">
                    <td class="p-4 pl-6 text-on-surface-variant whitespace-nowrap">${new Date(o.created_at).toLocaleDateString('zh-CN')}</td>
                    <td class="p-4 text-on-surface font-medium">${o.package_name}</td>
                    <td class="p-4 text-right font-medium text-on-surface whitespace-nowrap">¥${o.amount_cny}</td>
                    <td class="p-4 pr-6 text-right whitespace-nowrap">
                        <span class="${o.status === 'paid' ? 'text-green-600' : 'text-on-surface-variant'} font-semibold">${o.status === 'paid' ? '已支付' : o.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        // Transactions
        const txns = data.recentTransactions || [];
        const txnsBody = document.getElementById('dash-transactions');
        if (txns.length === 0) {
            txnsBody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-on-surface-variant">暂无记录</td></tr>';
        } else {
            txnsBody.innerHTML = txns.map(t => {
                const isPositive = t.amount > 0;
                return `
                    <tr class="hover:bg-surface-container-lowest/50 transition-colors">
                        <td class="p-4 pl-6 text-on-surface-variant whitespace-nowrap">${new Date(t.created_at).toLocaleDateString('zh-CN')}</td>
                        <td class="p-4 text-on-surface font-medium">${t.description}</td>
                        <td class="p-4 text-right font-medium ${isPositive ? 'text-primary' : 'text-error'} whitespace-nowrap">${isPositive ? '+' : ''}${t.amount}</td>
                        <td class="p-4 pr-6 text-right text-on-surface-variant whitespace-nowrap">${t.type}</td>
                    </tr>
                `;
            }).join('');
        }

    } catch (e) {
        console.error('Failed to load dashboard:', e);
    }
}

loadDashboard();
</script>
</body>
</html>
