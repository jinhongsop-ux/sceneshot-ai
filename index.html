<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SceneShot AI v0.6｜登录与高清解锁闭环</title><meta name="description" content="上传照片生成 AI 场景写真预览，登录后购买高清解锁次数并下载无水印结果。"><style>:root{--ink:#211816;--muted:#7d6a62;--line:#eadbd2;--hot:#f75f9b;--violet:#8b5cf6;--bg:#fff7f1;--shadow:0 24px 70px rgba(70,42,32,.12);--r:26px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:radial-gradient(circle at 18% 0%,#ffe4f1 0,#fff7f1 40%,#f8fff5 100%)}a{text-decoration:none;color:inherit}button,input,select{font:inherit}.shell{max-width:1180px;margin:auto;padding:0 22px}.top{position:sticky;top:0;z-index:30;background:rgba(255,247,241,.86);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.top .shell{min-height:76px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;gap:12px;align-items:center;font-weight:900}.mark{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,var(--hot),var(--violet));display:grid;place-items:center;color:white}.brand small{display:block;color:var(--muted);font-size:12px}.nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn,.nav a{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:10px 15px;background:rgba(255,255,255,.66);font-weight:850;cursor:pointer}.primary{border-color:transparent;background:linear-gradient(135deg,var(--ink),#4a2d45);color:white;box-shadow:0 16px 32px rgba(30,20,18,.17)}.danger{background:#fff0f4;color:#a12454;border-color:#ffd0df}.hero{padding:68px 0 34px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:center}.badge{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:999px;padding:9px 13px;color:#8f5067;font-size:13px;font-weight:900}.h1{font-size:clamp(42px,7vw,80px);line-height:1.02;letter-spacing:-.07em;margin:18px 0 20px}.lead{font-size:clamp(17px,2vw,22px);line-height:1.72;color:var(--muted);max-width:780px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0}.mini{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-weight:850;font-size:13px}.panel,.card,.phone{background:rgba(255,255,255,.76);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.phone{padding:18px;transform:rotate(1deg)}.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mock,.art,.cover{background:var(--grad);position:relative;overflow:hidden}.mock{min-height:390px;border-radius:26px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}.mock:first-child{background:linear-gradient(145deg,#f3dbcf,#fff)}.mock:before,.art:before,.cover:after,.result:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 46% 30%,rgba(255,255,255,.9) 0 7%,transparent 8%),linear-gradient(to top,rgba(0,0,0,.48),transparent 58%)}.mock b{z-index:1;color:white}.mock:first-child b{color:var(--ink)}.wm{position:absolute;right:16px;bottom:16px;color:white;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900}.section{padding:44px 0}.head{display:flex;justify-content:space-between;gap:18px;align-items:end;margin-bottom:22px}.head h2{font-size:clamp(30px,4vw,46px);letter-spacing:-.04em;margin:0}p,.muted{color:var(--muted);line-height:1.7}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{padding:16px;box-shadow:0 12px 34px rgba(70,42,32,.07)}.cover{height:215px;border-radius:22px;margin-bottom:12px}.tag{display:inline-block;margin:6px 5px 0 0;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.64);border:1px solid rgba(255,255,255,.6);font-size:12px;font-weight:900;color:#7b485c}.dark{background:#211816;color:white}.price{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:13px;margin-top:13px;color:var(--muted);font-size:13px}.detail{display:grid;grid-template-columns:.92fr 1.08fr;gap:28px}.panel{padding:22px}.form{display:grid;gap:14px}.field label{display:block;margin-bottom:7px;color:var(--muted);font-size:13px;font-weight:900}.input{width:100%;border:1px solid var(--line);border-radius:16px;background:white;padding:13px}.upload{border:2px dashed #e7c6d7;border-radius:22px;background:rgba(255,255,255,.62);padding:22px;text-align:center}.preview{min-height:330px;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:#f8eee8;display:grid;place-items:center}.preview img,.result img{width:100%;height:100%;object-fit:cover;display:block}.result{min-height:470px;border-radius:28px;overflow:hidden;position:relative;background:var(--grad)}.result img{filter:saturate(1.08) contrast(1.04)}.caption{position:absolute;left:20px;bottom:20px;right:20px;z-index:2;color:white;text-shadow:0 4px 20px rgba(0,0,0,.45)}.caption b{display:block;font-size:24px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{padding:18px;border-radius:22px;background:rgba(255,255,255,.66);border:1px solid var(--line)}.stat b{display:block;font-size:30px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left;font-size:14px}.toast{position:fixed;right:20px;bottom:20px;z-index:60;background:#211816;color:white;border-radius:16px;padding:13px 16px;box-shadow:var(--shadow);font-weight:900}@media(max-width:900px){.grid,.detail{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}}@media(max-width:620px){.top .shell{align-items:flex-start;padding-top:12px;padding-bottom:12px}.cards,.compare,.stats{grid-template-columns:1fr}.h1{font-size:42px}.mock{min-height:230px}}</style></head><body><header class="top"><div class="shell"><a class="brand" href="#/"><span class="mark">SS</span><span>SceneShot AI<small>v0.6 · Account + Unlock</small></span></a><nav class="nav"><a href="#/scenes">场景</a><a href="#/create">生成</a><a href="#/history">结果</a><a href="#/account">账户</a><a href="#/admin">后台</a><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成</a></nav></div></header><main id="app"></main><script>const scenes=[{slug:'korean-baseball-broadcast',title:'韩国棒球直播风格',hot:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#25122e,#f65f9a 55%,#ffe9ac)',desc:'上传自拍，生成像被韩国棒球赛直播镜头捕捉到的看球现场照片。',sub:'像真的被体育直播拍到，适合小红书、抖音和朋友圈晒图。',tags:['爆款','女生适合','直播感','韩国棒球'],tips:['正脸或半身照效果最好','光线清晰','避免多人合照']},{slug:'tokyo-night-street',title:'东京夜景街拍',hot:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#15192e,#6257ff 48%,#ff93cb)',desc:'把普通自拍变成东京街头霓虹夜景里的电影感街拍。',sub:'适合头像、朋友圈九宫格、旅行感虚拟照片。',tags:['夜景','东京','街拍']},{slug:'japanese-sakura-street',title:'日本樱花街拍',hot:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#ffd6e8,#fff5fb 45%,#9bd8b8)',desc:'上传一张照片，获得春日樱花街道里的清透日系写真。',sub:'轻旅行感、春日感、适合女生头像。',tags:['樱花','日系','春日']},{slug:'kpop-concert-audience',title:'K-pop 演唱会观众席',hot:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#1d1036,#a855f7 45%,#22d3ee)',desc:'生成仿佛你在演唱会内场被灯光照亮的追星现场照片。',sub:'舞台灯、荧光棒、人群光海。',tags:['K-pop','追星','演唱会']},{slug:'hong-kong-retro-portrait',title:'港风复古写真',hot:0,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#392311,#d55b3d 42%,#ffd18a)',desc:'把照片转成港风电影海报感的复古人像。',sub:'胶片色、霓虹、老街、复古镜头语言。',tags:['港风','复古','电影感']},{slug:'european-football-stand',title:'欧洲足球看台',hot:0,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#06351f,#28c76f 48%,#fff1a8)',desc:'生成像在欧洲足球赛现场看台被镜头捕捉的照片。',sub:'球场、人群、绿色草坪、现场欢呼感。',tags:['足球','看台','欧洲']}];let currentImg=null;const $=s=>document.querySelector(s),app=$('#app'),money=n=>'¥'+Number(n).toFixed(2);const db={user:JSON.parse(localStorage.ss_user||'null'),gens:JSON.parse(localStorage.ss_gens||'[]'),orders:JSON.parse(localStorage.ss_orders||'[]'),unlocks:Number(localStorage.ss_unlocks||0)};function save(){localStorage.ss_user=JSON.stringify(db.user);localStorage.ss_gens=JSON.stringify(db.gens);localStorage.ss_orders=JSON.stringify(db.orders);localStorage.ss_unlocks=String(db.unlocks)}function toast(t){let e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}function scene(slug){return scenes.find(s=>s.slug===slug)||scenes[0]}function requireLogin(){if(db.user)return true;toast('请先登录/注册');location.hash='#/account';return false}function card(s){return `<article class="card"><a href="#/scene/${s.slug}"><div class="cover" style="--grad:${s.grad}"><span class="wm">SceneShot</span></div></a>${s.hot?'<span class="tag dark">爆款</span>':''}${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}<h3>${s.title}</h3><p>${s.desc}</p><div class="price"><span>免费预览</span><b>${money(s.price)} 解锁高清</b></div><p><a class="btn primary" href="#/create/${s.slug}">试试这个场景</a></p></article>`}function home(){app.innerHTML=`<section class="hero"><div class="shell grid"><div><span class="badge">✨ v0.6 · 登录 + 高清解锁 + Mock 订单</span><h1 class="h1">上传照片，生成你的爆款 AI 场景写真</h1><p class="lead">现在已跑通商业闭环：登录后生成带水印预览，满意后购买高清解锁次数，订单记录会进入账户中心。</p><div class="actions"><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成我的照片</a><a class="btn" href="#/account">查看账户</a></div><div class="mini"><span>${db.user?'已登录：'+db.user.name:'未登录'}</span><span>剩余高清解锁：${db.unlocks}</span><span>订单：${db.orders.length}</span></div></div><div class="phone"><div class="compare"><div class="mock"><b>Before</b><b>上传自拍</b></div><div class="mock" style="--grad:${scenes[0].grad}"><b>After</b><b>韩国棒球直播风格</b><span class="wm">SceneShot AI</span></div></div></div></div></section><section class="section"><div class="shell"><div class="stats"><div class="stat"><b>${scenes.length}</b><span class="muted">场景商品</span></div><div class="stat"><b>${db.gens.length}</b><span class="muted">生成记录</span></div><div class="stat"><b>${db.unlocks}</b><span class="muted">高清解锁</span></div><div class="stat"><b>${db.orders.length}</b><span class="muted">Mock 订单</span></div></div></div></section><section class="section"><div class="shell"><div class="head"><div><h2>热门 AI 场景</h2><p>第一阶段保留 6 个高转化场景，不再做提示词库导航。</p></div><a class="btn" href="#/scenes">全部场景</a></div><div class="cards">${scenes.map(card).join('')}</div></div></section>`}function scenesPage(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Scene Gallery</span><h2>选择场景开始生成</h2><p>用户看到的是场景商品，不需要理解模型或提示词。</p></div><a class="btn primary" href="#/create">立即生成</a></div><div class="cards">${scenes.map(card).join('')}</div></div></section>`}function detail(slug){let s=scene(slug);app.innerHTML=`<section class="section"><div class="shell detail"><div class="panel"><div class="art" style="--grad:${s.grad};height:520px"><span class="wm">Preview</span></div></div><div class="panel">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}<h1 class="h1" style="font-size:48px">${s.title}</h1><p class="lead">${s.sub}</p><p>${s.desc}</p><div class="price"><span>免费生成带水印预览</span><b>${money(s.price)} 解锁高清</b></div><div class="actions"><a class="btn primary" href="#/create/${s.slug}">上传照片生成</a><a class="btn" href="#/scenes">换个场景</a></div></div></div></section>`}function create(slug){let s=scene(slug);app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Create</span><h2>上传照片生成带水印预览</h2><p>生成前需要登录；图片只在当前浏览器会话中预览，不写入本地存储。</p></div></div><div class="detail"><form class="panel form" id="f"><div class="field"><label>场景</label><select class="input" name="scene">${scenes.map(x=>`<option value="${x.slug}" ${x.slug===s.slug?'selected':''}>${x.title}</option>`).join('')}</select></div><div class="upload"><b>上传自拍 / 半身照</b><input type="file" name="photo" accept="image/*" class="input" required style="margin-top:12px"></div><div class="field"><label>比例</label><select class="input" name="ratio"><option value="4:5">4:5 小红书推荐</option><option value="1:1">1:1 头像</option><option value="9:16">9:16 抖音封面</option></select></div><button class="btn primary" type="submit">生成带水印预览</button></form><div class="panel"><h3>上传预览</h3><div class="preview" id="pv"><span class="muted">选择图片后显示预览</span></div><p class="muted">剩余高清解锁次数：${db.unlocks}</p></div></div></div></section>`;let url='';let input=$('input[name=photo]');input.onchange=e=>{let f=e.target.files&&e.target.files[0];if(!f)return;if(url)URL.revokeObjectURL(url);url=URL.createObjectURL(f);currentImg=url;$('#pv').innerHTML=`<img src="${url}" alt="上传预览">`};$('#f').onsubmit=e=>{e.preventDefault();if(!requireLogin())return;if(!currentImg){toast('请先上传照片');return}let sc=scene(e.target.scene.value);let g={id:'gen_'+Date.now(),scene:sc.title,slug:sc.slug,ratio:e.target.ratio.value,price:sc.price,time:new Date().toLocaleString(),unlocked:false,grad:sc.grad};window.lastImage=currentImg;db.gens.unshift(g);db.gens=db.gens.slice(0,20);save();toast('已生成带水印预览');location.hash='#/result/'+g.id}}function result(id){let g=db.gens.find(x=>x.id===id)||db.gens[0];if(!g)return history();let src=window.lastImage||'';app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Result</span><h2>${g.scene}</h2><p>${g.unlocked?'高清无水印已解锁':'当前是带水印预览，满意后解锁高清。'}</p></div><a class="btn" href="#/create/${g.slug}">再生成一张</a></div><div class="detail"><div class="panel"><h3>原始上传图</h3><div class="preview">${src?`<img src="${src}">`:'<span class="muted">本次会话图片已失效，请重新上传。</span>'}</div><p class="muted">比例：${g.ratio}｜${g.time}</p></div><div class="panel"><h3>生成结果</h3><div class="result" style="--grad:${g.grad}">${src?`<img src="${src}">`:''}<div class="caption"><b>${g.scene}</b><span>${g.unlocked?'HD No Watermark':'SceneShot AI 带水印预览'}</span></div>${g.unlocked?'':'<span class="wm">SceneShot AI Preview</span>'}</div><div class="actions"><button class="btn" onclick="toast('已模拟下载带水印图')">下载带水印图</button><button class="btn primary" onclick="unlock('${g.id}')">${g.unlocked?'已解锁':'¥2.99 解锁高清'}</button><button class="btn" onclick="buyPack(3,5.99,'三张尝鲜包')">¥5.99 解锁 3 张</button></div><p class="muted">剩余高清解锁次数：${db.unlocks}</p></div></div></div></section>`}function unlock(id){if(!requireLogin())return;let g=db.gens.find(x=>x.id===id);if(!g)return;if(g.unlocked){toast('这张已经解锁');return}if(db.unlocks>0){db.unlocks--;g.unlocked=true;addOrder('使用高清解锁次数',0,1,'paid');save();toast('已使用 1 次高清解锁');return result(id)}buyPack(1,2.99,'单张体验包',id)}function buyPack(count,amount,name,genId){if(!requireLogin())return;db.unlocks+=count;let order=addOrder(name,amount,count,'paid');if(genId){let g=db.gens.find(x=>x.id===genId);if(g){db.unlocks--;g.unlocked=true;order.generation_id=genId}}save();toast('Mock 支付成功：'+name);if(genId)result(genId);else route()}function addOrder(name,amount,count,status){let o={id:'ord_'+Date.now(),name,amount,count,status,time:new Date().toLocaleString(),user:db.user&&db.user.name};db.orders.unshift(o);return o}function account(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Account</span><h2>账户中心</h2><p>v0.6 使用本地 Mock 账号，下一步迁移为真实用户系统。</p></div>${db.user?'<button class="btn danger" onclick="logout()">退出登录</button>':''}</div>${db.user?accountView():loginView()}</div></section>`}function loginView(){return `<div class="panel"><h3>登录 / 注册</h3><p>第一版只用用户名 + 密码模拟登录，不做手机号和微信。</p><form class="form" onsubmit="doLogin(event)"><div class="field"><label>用户名</label><input class="input" name="name" placeholder="例如 reese" required></div><div class="field"><label>密码</label><input class="input" type="password" name="pwd" placeholder="任意密码" required></div><button class="btn primary">登录 / 注册</button></form></div>`}function accountView(){return `<div class="stats"><div class="stat"><b>${db.user.name}</b><span class="muted">当前用户</span></div><div class="stat"><b>${db.unlocks}</b><span class="muted">高清解锁次数</span></div><div class="stat"><b>${db.gens.length}</b><span class="muted">生成记录</span></div><div class="stat"><b>${db.orders.length}</b><span class="muted">订单记录</span></div></div><div class="panel" style="margin-top:18px"><h3>快速购买</h3><div class="actions"><button class="btn primary" onclick="buyPack(1,2.99,'单张体验包')">¥2.99 解锁 1 张</button><button class="btn" onclick="buyPack(3,5.99,'三张尝鲜包')">¥5.99 解锁 3 张</button></div></div><div class="panel" style="margin-top:18px"><h3>订单记录</h3>${ordersTable()}</div>`}function doLogin(e){e.preventDefault();db.user={name:e.target.name.value,time:new Date().toLocaleString()};save();toast('登录成功');account()}function logout(){db.user=null;save();toast('已退出');account()}function ordersTable(){return db.orders.length?`<table class="table"><tr><th>订单</th><th>金额</th><th>次数</th><th>状态</th><th>时间</th></tr>${db.orders.map(o=>`<tr><td>${o.name}</td><td>${money(o.amount)}</td><td>${o.count}</td><td>${o.status}</td><td>${o.time}</td></tr>`).join('')}</table>`:'<p>暂无订单。</p>'}function history(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">History</span><h2>生成记录</h2><p>只保存场景、时间和解锁状态，不保存用户图片。</p></div><button class="btn danger" onclick="db.gens=[];save();history()">清空</button></div>${db.gens.length?`<div class="cards">${db.gens.map(g=>`<article class="card"><a href="#/result/${g.id}"><div class="cover" style="--grad:${g.grad}"><span class="wm">${g.unlocked?'HD':'Preview'}</span></div></a><h3>${g.scene}</h3><p>${g.time}</p><div class="price"><span>${g.unlocked?'已解锁':'带水印预览'}</span><b>${g.ratio}</b></div></article>`).join('')}</div>`:'<div class="panel"><p>还没有生成记录。</p><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成</a></div>'}</div></section>`}function admin(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Admin · v0.6</span><h2>AI 场景商品后台</h2><p>当前为静态 Mock 后台，已能查看核心运营指标。</p></div></div><div class="stats"><div class="stat"><b>${scenes.length}</b><span>场景</span></div><div class="stat"><b>${db.gens.length}</b><span>生成</span></div><div class="stat"><b>${db.orders.length}</b><span>订单</span></div><div class="stat"><b>${db.unlocks}</b><span>剩余解锁</span></div></div><div class="panel" style="margin-top:18px"><h3>下一步 v0.7</h3><p>迁移到 Next.js + API Routes，接入服务端上传存储、真实 AI 图片生成、支付宝沙箱支付和订单回调。</p></div></div></section>`}function route(){let p=(location.hash||'#/').slice(1);if(p.startsWith('/scene/'))return detail(p.replace('/scene/',''));if(p.startsWith('/create/'))return create(p.replace('/create/',''));if(p.startsWith('/result/'))return result(p.replace('/result/',''));if(p==='/scenes')return scenesPage();if(p==='/create')return create('korean-baseball-broadcast');if(p==='/history')return history();if(p==='/account')return account();if(p==='/admin')return admin();home()}window.addEventListener('hashchange',route);route();</script></body></html>
