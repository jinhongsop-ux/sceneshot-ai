function gallery(){app.innerHTML=`<section class="section"><div class="shell"><div class="section-head"><div><span class="badge">Scene Gallery</span><h2>选择一个场景开始生成</h2><p>前台展示场景效果、价格和上传入口；隐藏 Prompt 只属于后台和后端。</p></div><a class="primary" href="#/create">立即生成</a></div><div class="cards">${store.scenes.map(card).join('')}</div></div></section>`}
function detail(slug){const s=sceneBy(slug);app.innerHTML=`<section class="section"><div class="shell detail"><div class="panel"><div class="cover" style="--grad:${s.grad};height:520px"><span class="watermark">带水印预览示意</span></div></div><div class="panel"><div class="tagrow">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><h1 class="h1" style="font-size:48px">${s.title}</h1><p class="lead">${s.sub}</p><p>${s.result}</p><h3>适合上传什么照片？</h3><ul>${s.tips.map(t=>`<li>${t}</li>`).join('')}</ul><div class="price"><span>免费生成带水印预览</span><b>${money(s.price)} 解锁高清无水印</b></div><div class="hero-actions"><a class="primary" href="#/create/${s.slug}">上传照片生成</a><a class="ghost" href="#/scenes">换个场景</a></div><h3>FAQ</h3><p><b>会暴露提示词吗？</b> 不会。SceneShot 的提示词资产只在后台/后端可见。</p><p><b>第一版支付怎么设计？</b> 单张 ${money(2.99)}，三张 ${money(5.99)}，不做复杂积分。</p></div></div></section>`}
function create(slug){const s=sceneBy(slug);app.innerHTML=`<section class="section"><div class="shell"><div class="section-head"><div><span class="badge">Create Preview</span><h2>上传照片生成带水印预览</h2><p>当前线上同步版使用 Mock 预览，下一步接真实上传存储、AI API 与支付宝。</p></div></div><div class="detail"><form class="panel form" id="form"><div class="field"><label>选择场景</label><select class="input" name="scene">${store.scenes.map(x=>`<option value="${x.slug}" ${x.slug===s.slug?'selected':''}>${x.title}</option>`).join('')}</select></div><div class="upload"><p><b>上传自拍 / 半身照</b></p><input type="file" name="photo" accept="image/*" class="input"/><p class="muted">第一阶段：保存上传图 → 生成带水印预览 → 结果页解锁入口。</p></div><div class="field"><label>比例</label><select class="input" name="ratio"><option>4:5 小红书推荐</option><option>1:1 头像</option><option>3:4 写真</option><option>9:16 抖音封面</option></select></div><button class="primary" type="submit">生成带水印预览</button></form><div class="panel"><h3>当前场景：${s.title}</h3><p>${s.desc}</p><div class="cover" style="--grad:${s.grad};height:280px"><span class="watermark">SceneShot AI</span></div><div id="result"></div></div></div></div></section>`;$('#form').onsubmit=e=>{e.preventDefault();const slug=e.target.scene.value;const sc=sceneBy(slug);const g={id:'gen_'+Date.now(),scene:sc.title,slug:sc.slug,price:sc.price,time:new Date().toLocaleString(),unlocked:false,grad:sc.grad};store.gens.unshift(g);save();$('#result').innerHTML=resultBlock(g);toast('已生成带水印预览')};$('select[name=scene]').onchange=e=>location.hash='#/create/'+e.target.value}
function resultBlock(g){return `<div class="results"><div class="result-img" style="background:${g.grad}"><h3>${g.scene}</h3><p>带水印预览图</p><span class="watermark">SceneShot AI Preview</span></div></div><div class="hero-actions"><button class="ghost" onclick="toast('已模拟下载带水印图')">下载带水印图</button><button class="primary" onclick="unlock('${g.id}')">${money(g.price)} 解锁高清无水印</button><a class="ghost" href="#/create/${g.slug}">再生成一张</a><a class="ghost" href="#/scenes">换个场景</a></div>`}
function unlock(id){const g=store.gens.find(x=>x.id===id);if(g){g.unlocked=true;save();toast('已模拟解锁高清无水印，v0.7 接支付宝真实支付')}}
function history(){app.innerHTML=`<section class="section"><div class="shell"><div class="section-head"><div><span class="badge">Results</span><h2>生成结果记录</h2><p>当前使用浏览器本地记录模拟，后续 v0.5/v0.6 改为服务端生成记录与用户高清解锁次数。</p></div></div>${store.gens.length?`<div class="cards">${store.gens.map(g=>`<article class="card"><div class="cover" style="--grad:${g.grad}"><span class="watermark">${g.unlocked?'HD Unlocked':'Preview'}</span></div><h3>${g.scene}</h3><p class="muted">${g.time}</p><div class="price"><span>${g.unlocked?'已解锁高清':'带水印预览'}</span><b>${g.unlocked?'可下载':'待解锁'}</b></div></article>`).join('')}</div>`:'<div class="panel"><p>还没有生成记录。先去生成一张韩国棒球直播风格照片。</p><a class="primary" href="#/create/korean-baseball-broadcast">立即生成</a></div>'}</div></section>`}
function admin(){app.innerHTML=`<section class="section"><div class="shell"><div class="section-head"><div><span class="badge">Scene Product Admin · Static Preview</span><h2>AI 场景产品管理后台</h2><p>线上同步版先展示后台结构。真正持久化新增/编辑场景，需要 v0.5 接 Vercel KV / Supabase / 数据库。</p></div><button class="primary" onclick="resetScenes()">恢复默认场景</button></div><div class="panel"><h3>后台定位</h3><p>后台不是文章 CMS，而是 AI 场景商品管理：场景文案、示例图、隐藏提示词、价格、生成参数、上架状态。</p><table class="table"><thead><tr><th>场景</th><th>状态</th><th>价格</th><th>隐藏 Prompt</th></tr></thead><tbody>${store.scenes.map(s=>`<tr><td>${s.title}</td><td>${s.hot?'热门':'已上架'}</td><td>${money(s.price)}</td><td>仅后台/后端可见，前台不展示</td></tr>`).join('')}</tbody></table></div><div class="panel" style="margin-top:18px"><h3>下一步真正后台字段</h3><p class="muted">Hidden Prompt Recipe、Hidden Negative Recipe、Before/After 示例图、价格配置、是否上架、生成记录、订单、手动补发高清解锁次数。</p></div></div></section>`}
function resetScenes(){localStorage.removeItem('ss_scenes');location.reload()}function route(){const h=location.hash||'#/';const p=h.slice(1);if(p.startsWith('/scene/'))return detail(p.replace('/scene/',''));if(p.startsWith('/create/'))return create(p.replace('/create/',''));if(p==='/scenes')return gallery();if(p==='/create')return create('korean-baseball-broadcast');if(p==='/history')return history();if(p==='/admin')return admin();home()}window.addEventListener('hashchange',route);route();
</script>
</body>
</html>
