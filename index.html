7%,transparent 8%),linear-gradient(to top,rgba(0,0,0,.46),transparent 58%)}.visualCard.main{width:62%;height:430px;right:10%;top:50px;--grad:linear-gradient(135deg,#25122e,#f65f9a 56%,#ffe9ac);animation:drift 8s var(--ease) infinite alternate}.visualCard.side{width:39%;height:250px;left:0;top:230px;--grad:linear-gradient(135deg,#15192e,#6257ff 48%,#ff93cb);animation:drift 10s var(--ease) infinite alternate-reverse}.visualCard.miniCard{width:34%;height:190px;right:0;bottom:20px;--grad:linear-gradient(135deg,#ffd6e8,#fff5fb 45%,#9bd8b8);animation:drift 9s var(--ease) infinite alternate}.caption{position:absolute;z-index:2;left:22px;right:22px;bottom:22px;color:white;text-shadow:0 5px 22px rgba(0,0,0,.4)}.caption b{display:block;font-size:26px;line-height:1.1}.wm{position:absolute;z-index:3;right:16px;bottom:16px;color:white;background:rgba(0,0,0,.30);border:1px solid rgba(255,255,255,.55);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900}.ticker{border-block:1px solid var(--line);overflow:hidden;background:rgba(255,255,255,.42);white-space:nowrap}.ticker div{display:inline-block;padding:18px 0;animation:marquee 28s linear infinite}.ticker span{margin:0 28px;color:#8f5067;font-weight:950}.section{padding:72px 0}.section.tight{padding:44px 0}.head{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:26px}.head h2{font-size:clamp(34px,5.6vw,72px);line-height:.96;letter-spacing:-.065em;margin:0}.head p{max-width:560px}.panel,.card,.stat,.step,.faq{background:rgba(255,255,255,.70);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 16px 48px rgba(64,37,30,.08)}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{padding:16px;position:relative;overflow:hidden;transition:transform .45s var(--ease),box-shadow .45s var(--ease)}.card:hover{transform:translateY(-8px) rotate(-.6deg);box-shadow:var(--shadow)}.cover{height:235px;border-radius:24px;margin-bottom:12px;background:var(--grad);position:relative;overflow:hidden}.tag{display:inline-block;margin:6px 5px 0 0;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.65);font-size:12px;font-weight:900;color:#7b485c}.dark{background:#18110f;color:white}.price{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:13px;margin-top:13px;color:var(--muted);font-size:13px}.grid2{display:grid;grid-template-columns:.92fr 1.08fr;gap:24px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.panel{padding:24px}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.step{padding:22px;position:relative;overflow:hidden}.step b{font-size:34px;display:block}.step h3,.card h3{font-size:22px;margin:12px 0 8px}.useGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.useBig{min-height:460px;border-radius:36px;background:linear-gradient(135deg,#20112c,#ff6aa9 55%,#ffe7a6);position:relative;overflow:hidden}.useList{display:grid;gap:14px}.stat{padding:22px}.stat b{font-size:36px;display:block}.form{display:grid;gap:14px}.field label{display:block;margin-bottom:7px;color:var(--muted);font-size:13px;font-weight:900}.input{width:100%;border:1px solid var(--line);border-radius:16px;background:white;padding:13px}.upload{border:2px dashed #e7c6d7;border-radius:24px;background:rgba(255,255,255,.62);padding:24px;text-align:center}.preview{min-height:340px;border:1px solid var(--line);border-radius:26px;overflow:hidden;background:#f8eee8;display:grid;place-items:center}.preview img,.result img{width:100%;height:100%;object-fit:cover;display:block}.result{min-height:500px;border-radius:30px;background:var(--grad);position:relative;overflow:hidden}.result img{filter:saturate(1.08) contrast(1.04)}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left;font-size:14px}.toast{position:fixed;right:20px;bottom:20px;z-index:80;background:#18110f;color:white;border-radius:18px;padding:14px 17px;box-shadow:var(--shadow);font-weight:900}.apiok{color:#0f8a5f;font-weight:900}.apiwarn{color:#a12454;font-weight:900}.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px;word-break:break-all}.reveal{opacity:0;transform:translateY(26px);transition:opacity .75s var(--ease),transform .75s var(--ease)}.reveal.on{opacity:1;transform:translateY(0)}@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}@keyframes floaty{to{transform:translate(8%,6%) scale(1.08)}}@keyframes drift{to{transform:translateY(-20px) rotate(2deg)}}@keyframes pulse{50%{transform:scale(1.06);box-shadow:0 0 0 10px rgba(255,95,158,.1)}}@keyframes marquee{to{transform:translateX(-50%)}}@media(max-width:980px){.heroGrid,.grid2,.useGrid{grid-template-columns:1fr}.stage{min-height:520px}.visualCard.main{right:2%;width:70%}.cards,.grid3{grid-template-columns:1fr 1fr}.steps{grid-template-columns:1fr 1fr}}@media(max-width:640px){.top .shell{align-items:flex-start;padding-block:12px}.cards,.grid3,.steps{grid-template-columns:1fr}.h1{font-size:48px}.stage{min-height:430px}.visualCard.main{width:86%;height:300px}.visualCard.side{top:220px}.visualCard.miniCard{display:none}}

<body>
<div class="ambient"></div><div class="ambient b"></div>
<header class="top"><div class="shell"><a class="brand" href="#/"><span class="mark">SS</span><span>SceneShot AI<small>v1.1 · Motion UI</small></span></a><nav class="nav"><a href="#/scenes">场景</a><a href="#/how-it-works">流程</a><a href="#/use-cases">用法</a><a href="#/pricing">价格</a><a href="#/faq">FAQ</a><a href="#/account">账户</a><a class="btn primary" href="#/create/korean-baseball-broadcast">开始生成</a></nav></div></header>
<main id="app"></main>
<script>
const fallbackScenes=[{slug:'korean-baseball-broadcast',title:'韩国棒球直播风格',hot:true,price:2.99,bundle:5.99,gradient:'linear-gradient(135deg,#25122e,#f65f9a 55%,#ffe9ac)',description:'上传自拍，生成像被韩国棒球赛直播镜头捕捉到的看球现场照片。',subtitle:'像真的被体育直播拍到，适合小红书、抖音和朋友圈晒图。',tags:['爆款','女生适合','直播感','韩国棒球']},{slug:'tokyo-night-street',title:'东京夜景街拍',hot:true,price:2.99,bundle:5.99,gradient:'linear-gradient(135deg,#15192e,#6257ff 48%,#ff93cb)',description:'把普通自拍变成东京街头霓虹夜景里的电影感街拍。',subtitle:'适合头像、朋友圈九宫格、旅行感虚拟照片。',tags:['夜景','东京','街拍']},{slug:'japanese-sakura-street',title:'日本樱花街拍',hot:true,price:2.99,bundle:5.99,gradient:'linear-gradient(135deg,#ffd6e8,#fff5fb 45%,#9bd8b8)',description:'上传一张照片，获得春日樱花街道里的清透日系写真。',subtitle:'轻旅行感、春日感、适合女生头像。',tags:['樱花','日系','春日']},{slug:'kpop-concert-audience',title:'K-pop 演唱会观众席',hot:true,price:2.99,bundle:5.99,gradient:'linear-gradient(135deg,#1d1036,#a855f7 45%,#22d3ee)',description:'生成仿佛你在演唱会内场被灯光照亮的追星现场照片。',subtitle:'舞台灯、荧光棒、人群光海。',tags:['K-pop','追星','演唱会']},{slug:'hong-kong-retro-portrait',title:'港风复古写真',hot:false,price:2.99,bundle:5.99,gradient:'linear-gradient(135deg,#392311,#d55b3d 42%,#ffd18a)',description:'把照片转成港风电影海报感的复古人像。',subtitle:'胶片色、霓虹、老街、复古镜头语言。',tags:['港风','复古','电影感']},{slug:'european-football-stand',title:'欧洲足球看台',hot:false,price:2.99,bundle:5.99,gradient:'linear-gradient(135deg,#06351f,#28c76f 48%,#fff1a8)',description:'生成像在欧洲足球赛现场看台被镜头捕捉的照片。',subtitle:'球场、人群、绿色草坪、现场欢呼感。',tags:['足球','看台','欧洲']}];
let scenes=fallbackScenes,currentImg=null,currentFile=null,apiStatus='checking';
const $=s=>document.querySelector(s),app=$('#app'),money=n=>'¥'+Number(n).toFixed(2);
const db={user:JSON.parse(localStorage.ss_user||'null'),gens:JSON.parse(localStorage.ss_gens||'[]'),orders:JSON.parse(localStorage.ss_orders||'[]'),unlocks:Number(localStorage.ss_unlocks||0)};
function save(){localStorage.ss_user=JSON.stringify(db.user);localStorage.ss_gens=JSON.stringify(db.gens);localStorage.ss_orders=JSON.stringify(db.orders);localStorage.ss_unlocks=String(db.unlocks)}
function toast(t){let e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2600)}
function scene(slug){return scenes.find(s=>s.slug===slug)||scenes[0]}
function requireLogin(){if(db.user)return true;toast('请先登录/注册');location.hash='#/account';return false}
async function apiPost(path,payload){const res=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload||{})});const data=await res.json().catch(()=>({ok:false,error:'invalid_json'}));if(!res.ok||!data.ok)throw new Error(data.message||data.error||'api_error');return data}
async function loadScenes(){try{const res=await fetch('/api/scenes');const data=await res.json();if(data.ok&&data.scenes?.length){scenes=data.scenes.map(s=>({...s,gradient:s.gradient||fallbackScenes.find(x=>x.slug===s.slug)?.gradient||'linear-gradient(135deg,#25122e,#f65f9a,#ffe9ac)'}));apiStatus='connected'}}catch(e){apiStatus='fallback'}route()}
function bindReveal(){document.querySelectorAll('.reveal').forEach((el,i)=>{setTimeout(()=>el.classList.add('on'),80+i*70)})}
function card(s){return `<article class="card reveal"><a href="#/scene/${s.slug}"><div class="cover" style="--grad:${s.gradient}"><span class="wm">SceneShot</span></div></a>${s.hot?'<span class="tag dark">爆款</span>':''}${(s.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}<h3>${s.title}</h3><p>${s.description}</p><div class="price"><span>免费带水印预览</span><b>${money(s.price||2.99)} 解锁高清</b></div><p><a class="btn primary" href="#/create/${s.slug}">试试这个场景</a></p></article>`}
function home(){app.innerHTML=`<section class="hero"><div class="shell heroGrid"><div class="heroCopy"><span class="eyebrow"><i class="dot"></i> Upload. Scene. Preview. Unlock.</span><h1 class="h1">一张自拍，<span class="soft">进入一个</span>像真的场景。</h1><p class="lead">SceneShot AI 把普通照片变成“像被现场镜头拍到”的场景写真。你不需要写 Prompt，只要选择场景，上传照片，先看带水印预览，满意后再解锁高清。</p><div class="actions"><a class="btn primary" href="#/create/korean-baseball-broadcast">上传照片开始</a><a class="btn" href="#/how-it-works">查看流程</a><a class="btn ghost" href="/api/health" target="_blank">API Health</a></div><div class="mini"><span>${db.user?'已登录：'+db.user.name:'未登录'}</span><span>剩余高清解锁：${db.unlocks}</span><span class="${apiStatus==='connected'?'apiok':'apiwarn'}">API：${apiStatus}</span></div></div><div class="stage"><div class="visualCard main"><div class="caption"><b>韩国棒球直播风格</b><span>像被现场大屏捕捉到的瞬间</span></div><span class="wm">Preview</span></div><div class="visualCard side"><div class="caption"><b>东京夜景街拍</b><span>Neon street portrait</span></div></div><div class="visualCard miniCard"><div class="caption"><b>樱花街拍</b><span>Soft spring photo</span></div></div></div></div></section><div class="ticker"><div><span>AI Scene Photo</span><span>Watermarked Preview</span><span>HD Unlock</span><span>Korean Baseball Broadcast</span><span>Tokyo Night Street</span><span>Sakura Portrait</span><span>AI Scene Photo</span><span>Watermarked Preview</span><span>HD Unlock</span></div></div><section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Scenes</span><h2>不是模板库，是可下单的场景商品。</h2></div><p>每个场景都对应一种明确的照片结果：直播镜头、街拍、演唱会、复古写真、球场看台。用户不用理解 AI，只需要选择“想变成哪种照片”。</p></div><div class="cards">${scenes.map(card).join('')}</div></div></section>${stepsSection()}${useCaseSection()}${pricingSection()}${faqSection()}`;bindReveal()}
function stepsSection(){return `<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">How it works</span><h2>四步完成一张可分享的 AI 场景照。</h2></div></div><div class="steps"><div class="step reveal"><b>01</b><h3>选择场景</h3><p>从韩国棒球、东京夜景、樱花街拍等场景中选择一个你想进入的画面。</p></div><div class="step reveal"><b>02</b><h3>上传照片</h3><p>上传清晰自拍或半身照。当前版本生成 upload token，后续可替换真实对象存储。</p></div><div class="step reveal"><b>03</b><h3>生成预览</h3><p>服务端创建生成任务，前端展示带水印预览，先看效果再决定是否付费。</p></div><div class="step reveal"><b>04</b><h3>解锁高清</h3><p>满意后用高清解锁次数去水印，适合头像、朋友圈、小红书和短视频封面。</p></div></div></div></section>`}
function useCaseSection(){return `<section class="section"><div class="shell useGrid"><div class="useBig reveal"><div class="caption"><b>For profile photos, social posts, fandom moments, virtual travel shots.</b><span>让普通照片拥有“像真的发生过”的现场感。</span></div><span class="wm">SceneShot AI</span></div><div class="useList"><div class="stat reveal"><b>头像</b><p>不想拍写真，也能快速得到一张更有氛围的新头像。</p></div><div class="stat reveal"><b>社媒</b><p>适合朋友圈、小红书、TikTok 封面和故事图。</p></div><div class="stat reveal"><b>追星 / 运动</b><p>演唱会、棒球赛、足球看台这类强情绪场景，更容易形成分享冲动。</p></div></div></div></section>`}
function pricingSection(){return `<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Pricing</span><h2>先免费看预览，再决定是否解锁。</h2></div><p>定价保持低门槛，适合冲动型消费：一张图满意就解锁，不满意就换场景再试。</p></div><div class="grid3"><div class="panel reveal"><span class="tag">Preview</span><h3>免费带水印预览</h3><p>上传照片并生成预览，先判断场景是否适合自己。</p><div class="price"><span>适合试效果</span><b>¥0</b></div></div><div class="panel reveal"><span class="tag dark">Popular</span><h3>单张高清解锁</h3><p>解锁当前结果，去水印，适合只想发一张图的用户。</p><div class="price"><span>1 次高清解锁</span><b>¥2.99</b></div><p><button class="btn primary" onclick="buyPack('single')">购买 1 次</button></p></div><div class="panel reveal"><span class="tag">Bundle</span><h3>三张尝鲜包</h3><p>适合同时测试多个场景，或者生成一组九宫格素材。</p><div class="price"><span>3 次高清解锁</span><b>¥5.99</b></div><p><button class="btn" onclick="buyPack('starter')">购买 3 次</button></p></div></div></div></section>`}
function faqSection(){return `<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">FAQ</span><h2>用户下单前最关心的问题。</h2></div></div><div class="grid2"><div class="faq panel reveal"><h3>我需要写 Prompt 吗？</h3><p>不需要。SceneShot AI 的产品不是提示词库，而是场景商品。用户只要选择想要的场景并上传照片。</p><h3>不满意会扣费吗？</h3><p>当前产品逻辑是先看带水印预览，再决定是否解锁高清。解锁前不应进入真实扣费环节。</p></div><div class="faq panel reveal"><h3>现在是真实 AI 生成吗？</h3><p>当前线上版本是 MVP 骨架：上传、生成、订单、解锁接口已经打通，但 AI Provider 和真实支付仍是 Mock。</p><h3>图片会被保存吗？</h3><p>当前版本只生成 imageToken，不上传真实图片内容。v1.1 可以接入 Vercel Blob、Cloudflare R2 或 S3。</p></div></div></div></section>`}
function scenesPage(){app.innerHTML=`<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Scene Gallery</span><h2>选择一个你想进入的画面。</h2></div><p>每个场景都对应明确的社交图片结果，后续可以继续扩展 Cosplay、旅行、体育、演唱会、城市街拍等分类。</p></div><div class="cards">${scenes.map(card).join('')}</div></div></section>`;bindReveal()}
function detail(slug){const s=scene(slug);app.innerHTML=`<section class="section"><div class="shell grid2"><div class="panel reveal"><div class="result" style="--grad:${s.gradient}"><div class="caption"><b>${s.title}</b><span>${s.subtitle||s.description}</span></div><span class="wm">Scene Preview</span></div></div><div class="panel reveal"><span class="eyebrow">Scene Detail</span><h1 class="h1" style="font-size:58px">${s.title}</h1><p class="lead">${s.subtitle||s.description}</p><p>${s.description}</p>${(s.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}<div class="price"><span>免费生成带水印预览</span><b>${money(s.price||2.99)} 解锁高清</b></div><div class="actions"><a class="btn primary" href="#/create/${s.slug}">上传照片生成</a><a class="btn" href="#/scenes">换个场景</a></div></div></div></section>`;bindReveal()}
function howItWorks(){app.innerHTML=stepsSection()+`<section class="section tight"><div class="shell"><div class="panel reveal"><h2>为什么不是提示词库？</h2><p>提示词库要求用户理解 Prompt、复制粘贴、自己调模型。SceneShot AI 的目标是把这些复杂步骤包装成一个消费级产品：用户只看到场景、预览和高清解锁。</p></div></div></section>`;bindReveal()}
function useCases(){app.innerHTML=useCaseSection()+`<section class="section tight"><div class="shell grid3"><div class="panel reveal"><h3>女生头像</h3><p>清透、浪漫、轻剧情感，适合头像和朋友圈。</p></div><div class="panel reveal"><h3>体育现场</h3><p>韩国棒球、欧洲足球等强现场感画面，适合制造话题。</p></div><div class="panel reveal"><h3>虚拟旅行</h3><p>东京、樱花、港风等场景，让用户快速获得旅行氛围素材。</p></div></div></section>`;bindReveal()}
function pricing(){app.innerHTML=pricingSection();bindReveal()}
function faq(){app.innerHTML=faqSection();bindReveal()}
function create(slug){const s=scene(slug);app.innerHTML=`<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Create</span><h2>上传照片，生成带水印预览。</h2></div><p>当前是 v1.1 UI 升级版，底层仍沿用 v1.0 上传 Token + 生成任务闭环。</p></div><div class="grid2"><form class="panel form reveal" id="f"><div class="field"><label>场景</label><select class="input" name="scene">${scenes.map(x=>`<option value="${x.slug}" ${x.slug===s.slug?'selected':''}>${x.title}</option>`).join('')}</select></div><div class="upload"><b>上传自拍 / 半身照</b><input type="file" name="photo" accept="image/jpeg,image/png,image/webp" class="input" required style="margin-top:12px"><p class="muted">建议使用清晰单人照。当前版本生成 imageToken，暂不保存真实文件。</p></div><div class="field"><label>图片比例</label><select class="input" name="ratio"><option value="4:5">4:5 小红书推荐</option><option value="1:1">1:1 头像</option><option value="9:16">9:16 短视频封面</option></select></div><button class="btn primary" type="submit">上传 Token 并生成预览</button></form><div class="panel reveal"><h3>上传预览</h3><div class="preview" id="pv"><span class="muted">选择图片后显示预览</span></div><p class="muted">剩余高清解锁次数：${db.unlocks}</p></div></div></div></section>`;let url='';let input=$('input[name=photo]');input.onchange=e=>{let f=e.target.files&&e.target.files[0];if(!f)return;if(url)URL.revokeObjectURL(url);url=URL.createObjectURL(f);currentImg=url;currentFile=f;$('#pv').innerHTML=`<img src="${url}" alt="上传预览">`};$('#f').onsubmit=async e=>{e.preventDefault();if(!requireLogin())return;if(!currentImg||!currentFile){toast('请先上传照片');return}const sc=scene(e.target.scene.value);const btn=e.target.querySelector('button');btn.disabled=true;btn.textContent='正在调用 /api/upload...';try{const upload=await apiPost('/api/upload',{fileName:currentFile.name,mimeType:currentFile.type||'image/jpeg',size:currentFile.size||0,userId:db.user.name});btn.textContent='正在调用 /api/generate...';const data=await apiPost('/api/generate',{sceneSlug:sc.slug,ratio:e.target.ratio.value,imageToken:upload.upload.imageToken});const g={id:data.generation.id,scene:sc.title,slug:sc.slug,ratio:data.generation.ratio,price:sc.price||2.99,time:new Date().toLocaleString(),unlocked:false,gradient:sc.gradient,apiStatus:data.generation.status,provider:data.generation.provider,imageToken:upload.upload.imageToken,uploadId:upload.upload.id,storageProvider:upload.upload.storageProvider};window.lastImage=currentImg;db.gens.unshift(g);db.gens=db.gens.slice(0,20);save();toast('上传 Token + 生成任务已创建');location.hash='#/result/'+g.id}catch(err){toast('生成失败：'+err.message)}finally{btn.disabled=false;btn.textContent='上传 Token 并生成预览'}};bindReveal()}
function result(id){let g=db.gens.find(x=>x.id===id)||db.gens[0];if(!g)return history();let src=window.lastImage||'';app.innerHTML=`<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Result</span><h2>${g.scene}</h2><p>${g.unlocked?'高清无水印已解锁':'当前是带水印预览，满意后解锁高清。'}</p></div><a class="btn" href="#/create/${g.slug}">再生成一张</a></div><div class="grid2"><div class="panel reveal"><h3>原始上传图</h3><div class="preview">${src?`<img src="${src}">`:'<span class="muted">本次会话图片已失效，请重新上传。</span>'}</div><p class="muted">Upload ID：${g.uploadId||'legacy'}</p><div class="code">imageToken：${g.imageToken||'legacy-browser-session-image'}</div></div><div class="panel reveal"><h3>生成结果</h3><div class="result" style="--grad:${g.gradient}">${src?`<img src="${src}">`:''}<div class="caption"><b>${g.scene}</b><span>${g.unlocked?'HD No Watermark':'SceneShot AI 带水印预览'}</span></div>${g.unlocked?'':'<span class="wm">SceneShot AI Preview</span>'}</div><div class="actions"><button class="btn" onclick="toast('正式版会下载真实预览图')">下载带水印图</button><button class="btn primary" onclick="unlock('${g.id}')">${g.unlocked?'已解锁':'解锁高清'}</button><button class="btn" onclick="buyPack('starter')">购买 3 张</button></div><p class="muted">剩余高清解锁次数：${db.unlocks}｜Storage：${g.storageProvider||'mock-token-storage'}</p></div></div></div></section>`;bindReveal()}
async function buyPack(pack='single'){if(!requireLogin())return;try{const data=await apiPost('/api/orders',{pack,userId:db.user.name,channel:'mock-alipay'});const o=data.order;db.orders.unshift({id:o.id,name:o.name,amount:o.amount,count:o.unlocks,status:o.status,time:new Date().toLocaleString(),api:true});db.unlocks+=o.unlocks;save();toast('订单 API 成功：'+o.name);route()}catch(err){toast('订单接口失败：'+err.message)}}
async function unlock(id){if(!requireLogin())return;let g=db.gens.find(x=>x.id===id);if(!g)return;if(g.unlocked){toast('这张已经解锁');return}try{if(db.unlocks<=0){await buyPack('single')}const data=await apiPost('/api/unlock',{generationId:id,userId:db.user.name});db.unlocks=Math.max(0,db.unlocks-1);g.unlocked=true;g.unlockId=data.unlock.id;db.orders.unshift({id:data.unlock.id,name:'高清解锁 API',amount:0,count:1,status:data.unlock.status,time:new Date().toLocaleString(),api:true});save();toast('解锁 API 成功');result(id)}catch(err){toast('解锁接口失败：'+err.message)}}
function account(){app.innerHTML=`<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Account</span><h2>账户中心</h2><p>当前仍是本地 Mock 账户；上传、生成、订单、解锁动作已经接入服务端 API。</p></div>${db.user?'<button class="btn danger" onclick="logout()">退出登录</button>':''}</div>${db.user?accountView():loginView()}</div></section>`;bindReveal()}
function loginView(){return `<div class="panel reveal"><h3>登录 / 注册</h3><form class="form" onsubmit="doLogin(event)"><div class="field"><label>用户名</label><input class="input" name="name" placeholder="例如 reese" required></div><div class="field"><label>密码</label><input class="input" type="password" placeholder="任意密码" required></div><button class="btn primary">登录 / 注册</button></form></div>`}
function accountView(){return `<div class="grid3"><div class="stat reveal"><b>${db.user.name}</b><span class="muted">当前用户</span></div><div class="stat reveal"><b>${db.unlocks}</b><span class="muted">高清解锁次数</span></div><div class="stat reveal"><b>${db.gens.length}</b><span class="muted">生成记录</span></div></div><div class="panel reveal" style="margin-top:18px"><h3>快速购买</h3><div class="actions"><button class="btn primary" onclick="buyPack('single')">¥2.99 / 1 张</button><button class="btn" onclick="buyPack('starter')">¥5.99 / 3 张</button></div></div><div class="panel reveal" style="margin-top:18px"><h3>订单记录</h3>${ordersTable()}</div>`}
function doLogin(e){e.preventDefault();db.user={name:e.target.name.value,time:new Date().toLocaleString()};save();toast('登录成功');account()}function logout(){db.user=null;save();toast('已退出');account()}
function ordersTable(){return db.orders.length?`<table class="table"><tr><th>订单</th><th>金额</th><th>次数</th><th>状态</th><th>时间</th></tr>${db.orders.map(o=>`<tr><td>${o.name}${o.api?' · API':''}</td><td>${money(o.amount||0)}</td><td>${o.count||1}</td><td>${o.status}</td><td>${o.time}</td></tr>`).join('')}</table>`:'<p>暂无订单。</p>'}
function history(){app.innerHTML=`<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">History</span><h2>生成记录</h2><p>Upload ID / Generation ID 来自服务端 API，记录暂存本地。</p></div><button class="btn danger" onclick="db.gens=[];save();history()">清空</button></div>${db.gens.length?`<div class="cards">${db.gens.map(g=>`<article class="card reveal"><a href="#/result/${g.id}"><div class="cover" style="--grad:${g.gradient}"><span class="wm">${g.unlocked?'HD':'Preview'}</span></div></a><h3>${g.scene}</h3><p>${g.time}</p><div class="price"><span>${g.unlocked?'已解锁':'带水印预览'}</span><b>${g.ratio}</b></div></article>`).join('')}</div>`:'<div class="panel reveal"><p>还没有生成记录。</p><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成</a></div>'}</div></section>`;bindReveal()}
function admin(){app.innerHTML=`<section class="section"><div class="shell"><div class="head reveal"><div><span class="eyebrow">Admin</span><h2>API 与 MVP 状态</h2><p>v1.1 主要升级 UI、动效和文案；API 链路保持 v1.0 稳定结构。</p></div></div><div class="grid3"><div class="stat reveal"><b>${scenes.length}</b><span>Scenes API</span></div><div class="stat reveal"><b>${db.gens.length}</b><span>Generate API</span></div><div class="stat reveal"><b>${db.orders.length}</b><span>Orders / Unlock</span></div></div><div class="panel reveal" style="margin-top:18px"><h3>当前接口</h3><p><a href="/api/health" target="_blank">/api/health</a> · <a href="/api/scenes" target="_blank">/api/scenes</a> · POST /api/upload · POST /api/generate · POST /api/orders · POST /api/unlock</p><p>下一步 v1.2：接真实对象存储或真实 AI Provider。</p></div></div></section>`;bindReveal()}
function route(){let p=(location.hash||'#/').slice(1);if(p.startsWith('/scene/'))return detail(p.replace('/scene/',''));if(p.startsWith('/create/'))return create(p.replace('/create/',''));if(p.startsWith('/result/'))return result(p.replace('/result/',''));if(p==='/scenes')return scenesPage();if(p==='/create')return create('korean-baseball-broadcast');if(p==='/history')return history();if(p==='/account')return account();if(p==='/admin')return admin();if(p==='/how-it-works')return howItWorks();if(p==='/use-cases')return useCases();if(p==='/pricing')return pricing();if(p==='/faq')return faq();home()}
window.addEventListener('hashchange',route);document.addEventListener('mousemove',e=>{document.documentElement.style.setProperty('--mx',e.clientX+'px')});loadScenes();
</script>
</body>
</html>
