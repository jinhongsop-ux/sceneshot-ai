lay:grid;gap:14px}.field label{font-size:13px;color:var(--muted);font-weight:900;display:block;margin-bottom:7px}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 14px;background:#fff}.upload{border:2px dashed #e7c6d7;border-radius:22px;background:rgba(255,255,255,.6);padding:22px;text-align:center}.preview{border-radius:24px;overflow:hidden;min-height:330px;background:#f7ece6;border:1px solid var(--line);position:relative;display:grid;place-items:center}.preview img{width:100%;height:100%;object-fit:cover;display:block}.result{min-height:480px;border-radius:28px;overflow:hidden;position:relative;background:var(--grad);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.6)}.result img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(1.08) contrast(1.04)}.result:after{content:"";position:absolute;inset:0;background:var(--overlay)}.caption{position:absolute;left:20px;bottom:20px;right:20px;color:#fff;z-index:2;text-shadow:0 4px 20px rgba(0,0,0,.45)}.caption b{display:block;font-size:24px}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.step{padding:20px;border-radius:24px;background:rgba(255,255,255,.68);border:1px solid var(--line)}.step b{font-size:36px;color:var(--hot)}.toast{position:fixed;right:20px;bottom:20px;background:#211816;color:white;border-radius:16px;padding:13px 16px;box-shadow:var(--shadow);font-weight:900}@media(max-width:900px){.hero-grid,.detail{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.result{min-height:380px}}@media(max-width:620px){.top .shell{align-items:flex-start;padding-top:12px;padding-bottom:12px}.cards,.steps,.compare{grid-template-columns:1fr}.h1{font-size:42px}.mock{min-height:240px}}
</style></head><body><header class="top"><div class="shell"><a class="brand" href="#/"><span class="mark">SS</span><span>SceneShot AI<small>v0.5 · Upload Preview</small></span></a><nav class="nav"><a href="#/scenes">场景</a><a href="#/create">生成</a><a href="#/history">结果</a><a href="#/admin">后台</a><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成</a></nav></div></header><main id="app"></main><script>
const scenes=[{slug:'korean-baseball-broadcast',title:'韩国棒球直播风格',hot:1,featured:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#25122e,#f65f9a 55%,#ffe9ac)',overlay:'linear-gradient(135deg,rgba(38,12,45,.32),rgba(247,95,155,.18),rgba(255,225,145,.20))',desc:'上传自拍，生成像被韩国棒球赛直播镜头捕捉到的看球现场照片。',sub:'像真的被体育直播拍到，适合小红书、抖音和朋友圈晒图。',tags:['爆款','女生适合','直播感','韩国棒球'],tips:['正脸或半身照效果最好','光线清晰','避免多人合照','不要遮挡脸部']},{slug:'tokyo-night-street',title:'东京夜景街拍',hot:1,featured:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#15192e,#6257ff 48%,#ff93cb)',overlay:'linear-gradient(135deg,rgba(21,25,46,.42),rgba(98,87,255,.18),rgba(255,147,203,.18))',desc:'把普通自拍变成东京街头霓虹夜景里的电影感街拍。',sub:'适合头像、朋友圈九宫格、旅行感虚拟照片。',tags:['夜景','东京','街拍','氛围感'],tips:['半身照效果更自然','面部清晰','服装轮廓明显']},{slug:'japanese-sakura-street',title:'日本樱花街拍',hot:1,featured:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#ffd6e8,#fff5fb 45%,#9bd8b8)',overlay:'linear-gradient(135deg,rgba(255,214,232,.32),rgba(255,255,255,.12),rgba(155,216,184,.2))',desc:'上传一张照片，获得春日樱花街道里的清透日系写真。',sub:'轻旅行感、春日感、适合女生头像和生活方式内容。',tags:['樱花','日系','春日','旅行感'],tips:['浅色衣服更容易出片','表情自然','单人照片优先']},{slug:'kpop-concert-audience',title:'K-pop 演唱会观众席',hot:1,featured:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#1d1036,#a855f7 45%,#22d3ee)',overlay:'linear-gradient(135deg,rgba(29,16,54,.38),rgba(168,85,247,.18),rgba(34,211,238,.16))',desc:'生成仿佛你在演唱会内场被灯光照亮的追星现场照片。',sub:'舞台灯、荧光棒、人群光海，强烈社交传播感。',tags:['K-pop','追星','演唱会','闪光灯'],tips:['脸部不要过暗','避免复杂背景','自拍/半身照均可']},{slug:'hong-kong-retro-portrait',title:'港风复古写真',hot:0,featured:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#392311,#d55b3d 42%,#ffd18a)',overlay:'linear-gradient(135deg,rgba(57,35,17,.36),rgba(213,91,61,.18),rgba(255,209,138,.18))',desc:'把照片转成港风电影海报感的复古人像。',sub:'胶片色、霓虹、老街、复古镜头语言。',tags:['港风','复古','胶片','电影感'],tips:['五官清晰','侧脸/正脸均可','深色服装也适合']},{slug:'european-football-stand',title:'欧洲足球看台',hot:0,featured:1,price:2.99,bundle:5.99,grad:'linear-gradient(135deg,#06351f,#28c76f 48%,#fff1a8)',overlay:'linear-gradient(135deg,rgba(6,53,31,.34),rgba(40,199,111,.2),rgba(255,241,168,.16))',desc:'生成像在欧洲足球赛现场看台被镜头捕捉的照片。',sub:'球场、人群、绿色草坪、现场欢呼感。',tags:['足球','看台','欧洲','赛事现场'],tips:['上半身清楚','表情自然','运动风服装更适合']}];
let currentImg=null;const $=s=>document.querySelector(s),app=$('#app'),money=n=>'¥'+Number(n).toFixed(2);const state={gens:JSON.parse(localStorage.ss_gens||'[]'),unlocks:Number(localStorage.ss_unlocks||0)};function save(){localStorage.ss_gens=JSON.stringify(state.gens);localStorage.ss_unlocks=String(state.unlocks)}function toast(t){let e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2300)}function scene(slug){return scenes.find(s=>s.slug===slug)||scenes[0]}function card(s){return `<article class="card"><a href="#/scene/${s.slug}"><div class="cover" style="--grad:${s.grad}"><span class="wm">SceneShot</span></div></a>${s.hot?'<span class="tag dark">爆款</span>':''}${s.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}<h3>${s.title}</h3><p>${s.desc}</p><div class="price"><span>免费带水印预览</span><b>${money(s.price)} 解锁高清</b></div><p><a class="btn primary" href="#/create/${s.slug}">试试这个场景</a></p></article>`}
function home(){app.innerHTML=`<section class="hero"><div class="shell hero-grid"><div><span class="badge">✨ SceneShot AI v0.5 · 真实上传预览版</span><h1 class="h1">上传一张照片，生成你的爆款 AI 场景写真</h1><p class="lead">不用写提示词，不用修图。现在已经可以选择本地照片，在浏览器里生成带水印预览效果。下一步接真实 AI API、服务端存储和支付宝。</p><div class="actions"><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成我的照片</a><a class="btn" href="#/scenes">查看场景</a></div><div class="mini"><span>真实上传预览</span><span>${money(2.99)} 解锁 1 张高清</span><span>剩余高清解锁次数：${state.unlocks}</span></div></div><div class="phone"><div class="compare"><div class="mock"><b class="muted">Before</b><b>本地上传自拍</b></div><div class="mock after" style="--grad:${scenes[0].grad}"><b style="color:white;z-index:1">After</b><b style="color:white;z-index:1">韩国棒球直播风格</b><span class="wm">SceneShot AI</span></div></div></div></div></section><section class="section"><div class="shell"><div class="steps"><div class="step"><b>1</b><h3>上传照片</h3><p>v0.5 已支持浏览器侧读取真实图片。</p></div><div class="step"><b>2</b><h3>生成预览</h3><p>当前为带水印模拟预览，真实 AI 后端后续接入。</p></div><div class="step"><b>3</b><h3>解锁入口</h3><p>保留 ¥2.99 单张和 ¥5.99 三张的轻付费结构。</p></div></div></div></section><section class="section"><div class="shell"><div class="head"><div><h2>热门 AI 场景</h2><p>每个场景都是一个可售卖的 AI 写真小商品。</p></div><a class="btn" href="#/scenes">全部场景</a></div><div class="cards">${scenes.map(card).join('')}</div></div></section>`}
function gallery(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Scene Gallery</span><h2>选择一个场景开始生成</h2><p>前台只展示场景效果、价格和上传入口；隐藏 Prompt 不在前端出现。</p></div><a class="btn primary" href="#/create">立即生成</a></div><div class="cards">${scenes.map(card).join('')}</div></div></section>`}
function detail(slug){const s=scene(slug);app.innerHTML=`<section class="section"><div class="shell detail"><div class="panel"><div class="art" style="--grad:${s.grad};height:520px"><span class="wm">带水印预览示意</span></div></div><div class="panel">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}<h1 class="h1" style="font-size:48px">${s.title}</h1><p class="lead">${s.sub}</p><p>${s.desc}</p><h3>适合上传什么照片？</h3><ul>${s.tips.map(t=>`<li>${t}</li>`).join('')}</ul><div class="price"><span>免费生成带水印预览</span><b>${money(s.price)} 解锁高清无水印</b></div><div class="actions"><a class="btn primary" href="#/create/${s.slug}">上传照片生成</a><a class="btn" href="#/scenes">换个场景</a></div></div></div></section>`}
function create(slug){const s=scene(slug);app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Create · v0.5</span><h2>上传照片生成带水印预览</h2><p>请选择本地图片。v0.5 会读取真实上传图，但不会把图片内容写入本地存储。</p></div></div><div class="detail"><form class="panel form" id="form"><div class="field"><label>选择场景</label><select class="input" name="scene">${scenes.map(x=>`<option value="${x.slug}" ${x.slug===s.slug?'selected':''}>${x.title}</option>`).join('')}</select></div><div class="upload"><p><b>上传自拍 / 半身照</b></p><input type="file" name="photo" accept="image/*" class="input" required><p class="muted">当前版本仅在浏览器会话中预览图片。</p></div><div class="field"><label>比例</label><select class="input" name="ratio"><option value="4:5">4:5 小红书推荐</option><option value="1:1">1:1 头像</option><option value="3:4">3:4 写真</option><option value="9:16">9:16 抖音封面</option></select></div><button class="btn primary" type="submit">生成带水印预览</button></form><div class="panel"><h3>上传预览</h3><div class="preview" id="pv"><span class="muted">选择图片后，这里会显示真实上传预览。</span></div><p class="muted">当前场景：<b id="sn">${s.title}</b></p></div></div></div></section>`;let url='';const input=$('input[name=photo]');input.onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;if(url)URL.revokeObjectURL(url);url=URL.createObjectURL(f);currentImg=url;$('#pv').innerHTML=`<img src="${url}" alt="上传预览">`};$('select[name=scene]').onchange=e=>$('#sn').textContent=scene(e.target.value).title;$('#form').onsubmit=e=>{e.preventDefault();if(!currentImg){toast('请先上传一张照片');return}const sc=scene(e.target.scene.value);const g={id:'gen_'+Date.now(),scene:sc.title,slug:sc.slug,price:sc.price,ratio:e.target.ratio.value,time:new Date().toLocaleString(),unlocked:false,grad:sc.grad,overlay:sc.overlay,img:'session'};window.lastImage=currentImg;state.gens.unshift(g);state.gens=state.gens.slice(0,12);save();toast('已生成带水印预览');location.hash='#/result/'+g.id}}
function result(id){const g=state.gens.find(x=>x.id===id)||state.gens[0];if(!g){history();return}const src=window.lastImage||'';app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Result Preview</span><h2>${g.scene}</h2><p>当前是带水印预览。刷新后图片会失效，正式版会接服务端存储。</p></div><a class="btn" href="#/create/${g.slug}">再生成一张</a></div><div class="detail"><div class="panel"><h3>原始上传图</h3><div class="preview">${src?`<img src="${src}">`:'<span class="muted">本次会话图片已失效，请重新上传。</span>'}</div><p class="muted">比例：${g.ratio}｜生成时间：${g.time}</p></div><div class="panel"><h3>带水印预览结果</h3><div class="result" style="--grad:${g.grad};--overlay:${g.overlay}">${src?`<img src="${src}">`:''}<div class="caption"><b>${g.scene}</b><span>${g.unlocked?'已解锁高清无水印':'SceneShot AI 带水印预览'}</span></div>${g.unlocked?'':'<span class="wm">SceneShot AI Preview</span>'}</div><div class="actions"><button class="btn" onclick="toast('已模拟下载带水印图')">下载带水印图</button><button class="btn primary" onclick="unlock('${g.id}')">${g.unlocked?'已解锁高清':'¥2.99 解锁高清无水印'}</button><button class="btn" onclick="buy3()">¥5.99 解锁 3 张</button><a class="btn" href="#/scenes">换个场景</a></div><p class="muted">剩余高清解锁次数：${state.unlocks}</p></div></div></div></section>`}
function unlock(id){const g=state.gens.find(x=>x.id===id);if(!g)return;if(g.unlocked){toast('这张已经解锁');return}if(state.unlocks>0){state.unlocks--;g.unlocked=true;save();toast('已使用 1 次高清解锁');result(id);return}g.unlocked=true;save();toast('已模拟支付 ¥2.99 并解锁，v0.7 接支付宝');result(id)}function buy3(){state.unlocks+=3;save();toast('已模拟购买 3 次高清解锁');route()}
function history(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Generation Records</span><h2>生成结果记录</h2><p>v0.5 只保存文字记录，不保存用户图片。</p></div><button class="btn" onclick="state.gens=[];save();history()">清空记录</button></div>${state.gens.length?`<div class="cards">${state.gens.map(g=>`<article class="card"><a href="#/result/${g.id}"><div class="cover" style="--grad:${g.grad}"><span class="wm">${g.unlocked?'HD':'Preview'}</span></div></a><h3>${g.scene}</h3><p>${g.time}</p><div class="price"><span>${g.unlocked?'已解锁高清':'带水印预览'}</span><b>${g.ratio}</b></div></article>`).join('')}</div>`:'<div class="panel"><p>还没有生成记录。</p><a class="btn primary" href="#/create/korean-baseball-broadcast">立即生成</a></div>'}</div></section>`}
function admin(){app.innerHTML=`<section class="section"><div class="shell"><div class="head"><div><span class="badge">Scene Product Admin · v0.5</span><h2>AI 场景产品管理后台</h2><p>当前静态版展示后台结构。下一步迁移到 Next.js/API + 数据库存储。</p></div></div><div class="panel"><h3>v0.6 建议</h3><p>把当前浏览器上传预览升级为服务端上传存储：Vercel Blob / Cloudflare R2 + Next.js API Routes + 用户登录 + Generation 数据表。</p><p>当前上架场景：${scenes.length}｜本地生成记录：${state.gens.length}｜剩余高清解锁次数：${state.unlocks}</p></div></div></section>`}
function route(){const p=(location.hash||'#/').slice(1);if(p.startsWith('/scene/'))return detail(p.replace('/scene/',''));if(p.startsWith('/create/'))return create(p.replace('/create/',''));if(p.startsWith('/result/'))return result(p.replace('/result/',''));if(p==='/scenes')return gallery();if(p==='/create')return create('korean-baseball-broadcast');if(p==='/history')return history();if(p==='/admin')return admin();home()}window.addEventListener('hashchange',route);route();
