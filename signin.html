<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SceneShot AI - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/shared.css"/>
<script src="js/shared.js"></script>
<script>tailwind.config = TAILWIND_CONFIG;</script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Decorative Blobs -->
<div class="absolute -top-32 -left-32 w-96 h-96 bg-primary rounded-full blur-[150px] opacity-[0.06] pointer-events-none"></div>
<div class="absolute -bottom-32 -right-32 w-96 h-96 bg-secondary rounded-full blur-[150px] opacity-[0.06] pointer-events-none"></div>

<!-- Login Card -->
<div class="relative z-10 w-full max-w-md mx-margin-mobile">
<div class="bg-surface-container-lowest rounded-3xl p-8 md:p-12 shadow-[0_30px_80px_rgba(35,31,27,0.08)] border border-outline-variant/20 reveal-scale">
<!-- Logo -->
<div class="flex justify-center mb-8">
<div class="w-16 h-16 bg-surface-container rounded-2xl flex items-center justify-center border border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<!-- Header -->
<h1 class="font-headline-lg text-headline-lg-mobile text-center mb-2" data-i18n="signin.title">欢迎来到 SceneShot AI</h1>
<p class="text-center text-on-surface-variant font-body-md text-body-md mb-8" data-i18n-html="signin.subtitle" data-i18n="signin.subtitle">获得 <span class="text-primary font-semibold">20 个免费试用积分</span></p>
<!-- Google Login -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 rounded-full border-2 border-outline-variant hover:border-primary transition-colors font-label-bold text-label-bold text-on-surface mb-4">
<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span data-i18n="signin.google">使用 Google 登录</span>
        </button>
<!-- Divider -->
<div class="flex items-center gap-4 my-6">
<div class="flex-1 h-px bg-outline-variant/30"></div>
<span class="font-caption text-caption text-on-surface-variant" data-i18n="signin.or">或</span>
<div class="flex-1 h-px bg-outline-variant/30"></div>
</div>
<!-- Email Login -->
<button class="w-full cta-btn justify-center py-4">
<span class="material-symbols-outlined">mail</span>
            <span data-i18n="signin.email">使用邮箱登录</span>
        </button>
<!-- Terms -->
<p class="text-center font-caption text-caption text-on-surface-variant mt-8 opacity-60">
            <span data-i18n="signin.terms">继续即表示您同意我们的</span>
            <a href="#" class="text-primary hover:underline" data-i18n="signin.tos">服务条款</a> 和
            <a href="#" class="text-primary hover:underline" data-i18n="signin.privacy">隐私政策</a>
        </p>
</div>
<!-- Back to Home -->
<div class="text-center mt-6">
<a href="index.html" class="text-on-surface-variant hover:text-on-surface transition-colors font-caption text-caption flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                <span data-i18n="signin.back">返回首页</span>
            </a>
</div>
</div>
<script>
// No navbar on signin page for clean look
</script>
</body>
</html>
